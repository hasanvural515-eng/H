<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Uçak Oyunu</title>

<style>
body {
    margin: 0;
    overflow: hidden;
}

canvas {
    display: block;
}
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 22px;
}
#gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    text-align: center;
    color: white;
}
button {
    padding: 12px 25px;
    font-size: 18px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">Can: 3</div>

<div id="gameOver">
    <h1>ÖLDÜN</h1>
    <button onclick="restart()">Yeniden Başla</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// RESİMLER
const bgImg = new Image();
bgImg.src = "background.png";

const playerImg = new Image();
playerImg.src = "player.png";

const enemyImg = new Image();
enemyImg.src = "enemy.png";

const missileImg = new Image();
missileImg.src = "missile.png";

// OYUNCU (BÜYÜTÜLDÜ)
let player = {
    x: canvas.width / 2 - 50,
    y: canvas.height - 140,
    width: 100,   // büyüdü
    height: 100
};

let bullets = [];
let enemies = [];
let lives = 3;
let gameOver = false;

// DOKUNMATİK
canvas.addEventListener("touchmove", (e) => {
    let touch = e.touches[0];
    player.x = touch.clientX - player.width / 2;
});

// ATEŞ
setInterval(() => {
    if (gameOver) return;

    bullets.push({
        x: player.x + player.width/2 - 10,
        y: player.y,
        width: 25,
        height: 50
    });

}, 250);

// DÜŞMAN (BÜYÜTÜLDÜ)
setInterval(() => {
    if (gameOver) return;

    enemies.push({
        x: Math.random() * (canvas.width - 90),
        y: -100,
        width: 90,   // büyüdü
        height: 90,
        speed: 3 + Math.random() * 2
    });

}, 700);

// ÇARPIŞMA
function collision(a, b) {
    return a.x < b.x + b.width &&
           a.x + a.width > b.x &&
           a.y < b.y + b.height &&
           a.y + a.height > b.y;
}

// OYUN DÖNGÜSÜ
function gameLoop() {

    // ARKA PLAN ÇİZ
    ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

    // OYUNCU
    ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);

    // MERMİLER
    bullets.forEach((b, i) => {
        b.y -= 12;
        ctx.drawImage(missileImg, b.x, b.y, b.width, b.height);

        if (b.y < 0) bullets.splice(i, 1);
    });

    // DÜŞMANLAR
    enemies.forEach((e, ei) => {
        e.y += e.speed;
        ctx.drawImage(enemyImg, e.x, e.y, e.width, e.height);

        // ÇARPIŞMA
        if (collision(player, e)) {
            enemies.splice(ei, 1);
            lives--;
            document.getElementById("ui").innerText = "Can: " + lives;

            if (lives <= 0) {
                gameOver = true;
                document.getElementById("gameOver").style.display = "block";
            }
        }

        // MERMİ ÇARPIŞMA
        bullets.forEach((b, bi) => {
            if (collision(b, e)) {
                enemies.splice(ei, 1);
                bullets.splice(bi, 1);
            }
        });
    });

    if (!gameOver) requestAnimationFrame(gameLoop);
}

gameLoop();

// YENİDEN BAŞLA
function restart() {
    bullets = [];
    enemies = [];
    lives = 3;
    gameOver = false;
    player.x = canvas.width / 2 - 50;

    document.getElementById("ui").innerText = "Can: 3";
    document.getElementById("gameOver").style.display = "none";

    gameLoop();
}
</script>

</body>
</html>
