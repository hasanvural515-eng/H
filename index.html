<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Uçak Oyunu</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

canvas {
    display: block;
}

#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 20px;
}

#gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    text-align: center;
    color: white;
}

button {
    padding: 12px 25px;
    font-size: 18px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">Can: 3</div>

<div id="gameOver">
    <h1>ÖLDÜN</h1>
    <button onclick="restart()">Yeniden Başla</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// RESİMLER
const playerImg = new Image();
playerImg.src = "player.png";

const enemyImg = new Image();
enemyImg.src = "enemy.png";

const missileImg = new Image();
missileImg.src = "missile.png";

// OYUNCU
let player = {
    x: canvas.width / 2 - 35,
    y: canvas.height - 120,
    width: 70,
    height: 70
};

// OYUN VERİLERİ
let bullets = [];
let enemies = [];
let lives = 3;
let gameOver = false;

// DOKUNMATİK KONTROL
canvas.addEventListener("touchmove", (e) => {
    let touch = e.touches[0];
    player.x = touch.clientX - player.width / 2;
});

// OTOMATİK ATEŞ
setInterval(() => {
    if (gameOver) return;

    bullets.push({
        x: player.x + player.width/2 - 10,
        y: player.y,
        width: 20,
        height: 40
    });

}, 300);

// DÜŞMAN OLUŞTUR
setInterval(() => {
    if (gameOver) return;

    enemies.push({
        x: Math.random() * (canvas.width - 60),
        y: -80,
        width: 60,
        height: 60,
        speed: 3 + Math.random() * 2
    });

}, 800);

// ÇARPIŞMA
function collision(a, b) {
    return a.x < b.x + b.width &&
           a.x + a.width > b.x &&
           a.y < b.y + b.height &&
           a.y + a.height > b.y;
}

// OYUN DÖNGÜSÜ
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // OYUNCU
    ctx.drawImage(playerImg, player.x, player.y, player.width, player.height);

    // MERMİLER
    bullets.forEach((b, i) => {
        b.y -= 10;
        ctx.drawImage(missileImg, b.x, b.y, b.width, b.height);

        if (b.y < 0) bullets.splice(i, 1);
    });

    // DÜŞMANLAR
    enemies.forEach((e, ei) => {
        e.y += e.speed;
        ctx.drawImage(enemyImg, e.x, e.y, e.width, e.height);

        // Oyuncuya çarpma
        if (collision(player, e)) {
            enemies.splice(ei, 1);
            lives--;
            document.getElementById("ui").innerText = "Can: " + lives;

            if (lives <= 0) {
                gameOver = true;
                document.getElementById("gameOver").style.display = "block";
            }
        }

        // Mermi çarpması
        bullets.forEach((b, bi) => {
            if (collision(b, e)) {
                enemies.splice(ei, 1);
                bullets.splice(bi, 1);
            }
        });
    });

    if (!gameOver) requestAnimationFrame(gameLoop);
}

gameLoop();

// YENİDEN BAŞLAT
function restart() {
    bullets = [];
    enemies = [];
    lives = 3;
    gameOver = false;
    player.x = canvas.width / 2 - 35;

    document.getElementById("ui").innerText = "Can: 3";
    document.getElementById("gameOver").style.display = "none";

    gameLoop();
}
</script>

</body>
</html>
